name: Deploy With Docker

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, linux]
    env:
      IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || 'latest' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate docker secrets
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          [ -n "${DOCKERHUB_USERNAME}" ] || { echo "Missing secret: DOCKERHUB_USERNAME"; exit 1; }
          [ -n "${DOCKERHUB_TOKEN}" ] || { echo "Missing secret: DOCKERHUB_TOKEN"; exit 1; }

      - name: Pull and restart containers
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail

          if [ ! -f .env.prod ]; then
            cp .env.prod.example .env.prod
          fi

          echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin

          BACKEND_IMAGE="$DOCKERHUB_USERNAME/pet-backend:$IMAGE_TAG" \
          FRONTEND_IMAGE="$DOCKERHUB_USERNAME/pet-frontend:$IMAGE_TAG" \
          docker compose --env-file .env.prod -f docker-compose.prod.yml pull

          BACKEND_IMAGE="$DOCKERHUB_USERNAME/pet-backend:$IMAGE_TAG" \
          FRONTEND_IMAGE="$DOCKERHUB_USERNAME/pet-frontend:$IMAGE_TAG" \
          docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --remove-orphans

          docker image prune -f
